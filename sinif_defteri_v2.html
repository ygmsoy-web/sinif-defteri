<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1923">
<title>Sınıf Defteri</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #2f81f7;
  --accent-dim: #1f4d99;
  --green: #3fb950;
  --green-dim: #0d3320;
  --red: #f85149;
  --red-dim: #3d1a1a;
  --yellow: #d29922;
  --yellow-dim: #2d1f00;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
}
[data-theme="light"] {
  --bg: #f6f8fa;
  --bg2: #ffffff;
  --bg3: #eaeef2;
  --border: #d0d7de;
  --text: #1f2328;
  --text2: #656d76;
  --accent: #0969da;
  --accent-dim: #ddf4ff;
  --green: #1a7f37;
  --green-dim: #dafbe1;
  --red: #cf222e;
  --red-dim: #ffebe9;
  --yellow: #9a6700;
  --yellow-dim: #fff8c5;
  --shadow: 0 4px 24px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;transition:background .2s,color .2s}
button{cursor:pointer;font-family:inherit}
.hidden{display:none!important}

/* TOPBAR */
.topbar{background:var(--bg2);padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.topbar-back{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:6px 13px;font-size:18px;font-weight:700;flex-shrink:0}
.topbar-info{flex:1;min-width:0}
.topbar-title{font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.theme-btn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:7px 10px;font-size:16px;color:var(--text)}

/* PAGES */
.page{padding:16px}
.hidden{display:none!important}

/* HOME */
.home-header{padding:24px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.home-title{font-size:22px;font-weight:800;color:var(--text)}
.home-sub{font-size:13px;color:var(--text2);margin-top:2px}
.btn-new-class{display:flex;align-items:center;gap:8px;width:calc(100% - 32px);margin:8px 16px;padding:15px;border:2px dashed var(--accent);border-radius:var(--radius);background:transparent;color:var(--accent);font-size:14px;font-weight:700}
.class-card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin:0 16px 10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s}
.class-card:active{border-color:var(--accent)}
.class-card-name{font-weight:800;font-size:16px;color:var(--text)}
.class-card-meta{font-size:12px;color:var(--text2);margin-top:3px}
.class-card-right{display:flex;gap:8px;align-items:center}
.btn-icon{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:14px;color:var(--text2)}
.btn-icon-red{background:var(--red-dim);border:none;color:var(--red)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}

/* FORM */
.form-wrap{padding:16px}
.field-group{margin-bottom:16px}
.field-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.field-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--text);outline:none;font-family:inherit;transition:border-color .15s}
.field-input:focus{border-color:var(--accent)}
.field-select{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--text);outline:none;font-family:inherit;appearance:none;-webkit-appearance:none}
.field-hint{font-size:11px;color:var(--text2);margin-top:5px}
.btn-primary{width:100%;padding:14px;border:none;border-radius:var(--radius);background:var(--accent);color:white;font-size:15px;font-weight:800;margin-bottom:10px}
.btn-secondary{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--text);font-size:14px;font-weight:700;margin-bottom:10px}
.btn-danger{width:100%;padding:13px;border:none;border-radius:var(--radius);background:var(--red-dim);color:var(--red);font-size:14px;font-weight:700}

/* COLUMN BUILDER */
.col-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.col-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.col-card-num{background:var(--accent-dim);color:var(--accent);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:800}
.col-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.col-type-btn{padding:9px 6px;border:1.5px solid var(--border);border-radius:9px;background:transparent;color:var(--text2);font-size:11px;font-weight:700;text-align:center;transition:all .15s}
.col-type-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.criteria-preview{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px;color:var(--text2)}
.btn-add-criteria{display:flex;align-items:center;gap:6px;padding:9px 12px;border:1.5px dashed var(--green);border-radius:9px;background:transparent;color:var(--green);font-size:12px;font-weight:700;margin-top:8px;width:100%}

/* TOOLBAR */
.toolbar{display:flex;gap:5px;padding:8px 12px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg2)}
.toolbar-btn{flex:1;padding:9px 4px;border:none;border-radius:9px;font-size:11px;font-weight:800;min-width:52px;white-space:nowrap}

/* TABLE */
.table-wrap{overflow-x:auto;padding:12px 12px 100px}
table{width:100%;border-collapse:collapse;background:var(--bg2);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);font-size:12px}
thead tr{background:var(--bg3)}
th{padding:10px 6px;font-size:10px;font-weight:700;color:var(--text2);text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
th.left{text-align:left;padding-left:10px}
td{padding:5px 4px;vertical-align:middle;text-align:center;border-bottom:1px solid var(--border)}
td.left{text-align:left;padding-left:8px}
tr.even{background:var(--bg2)}
tr.odd{background:var(--bg)}

/* SCORE CELLS */
.cell-counter{display:flex;flex-direction:column;align-items:center;gap:3px}
.cell-val{font-weight:800;font-size:14px;min-width:28px;text-align:center;font-family:'DM Mono',monospace}
.cell-btns{display:flex;gap:3px}
.btn-p{width:34px;height:34px;border:none;border-radius:8px;background:var(--green-dim);color:var(--green);font-size:20px;font-weight:900}
.btn-m{width:34px;height:34px;border:none;border-radius:8px;background:var(--red-dim);color:var(--red);font-size:20px;font-weight:900}

.cell-dual{display:flex;gap:3px;font-size:12px;font-weight:800;font-family:'DM Mono',monospace}
.dual-pos{color:var(--green)}
.dual-neg{color:var(--red)}

.cell-manual{display:flex;flex-direction:column;align-items:center;gap:3px}
.manual-val{font-weight:800;font-size:15px;font-family:'DM Mono',monospace;min-width:36px;text-align:center;cursor:pointer;padding:4px 6px;border-radius:7px;background:var(--bg3);border:1px solid var(--border)}
.manual-val:hover{border-color:var(--accent)}
.manual-val.has-criteria{color:var(--accent)}

/* NOTE */
.name-cell{cursor:pointer}
.note-dot{display:inline-block;width:6px;height:6px;background:var(--yellow);border-radius:50%;margin-left:4px;vertical-align:middle}

/* CLASS NOTE BAR */
.class-note-bar{margin:0 12px 8px;background:var(--yellow-dim);border-radius:10px;padding:10px 14px;border-left:3px solid var(--yellow);cursor:pointer}
.class-note-bar-label{font-size:10px;font-weight:700;color:var(--yellow);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.class-note-bar-text{font-size:13px;color:var(--text);white-space:pre-wrap;line-height:1.4}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:640px;border-top:1px solid var(--border);max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.modal-btns button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:800}
.note-textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:13px;font-size:14px;color:var(--text);outline:none;resize:none;height:150px;font-family:inherit;line-height:1.5}
.note-textarea:focus{border-color:var(--accent)}

/* MANUAL INPUT MODAL */
.manual-input-big{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:16px;font-size:28px;font-weight:800;color:var(--text);text-align:center;outline:none;font-family:'DM Mono',monospace}
.manual-input-big:focus{border-color:var(--accent)}

/* CRITERIA MODAL */
.criteria-row{background:var(--bg3);border-radius:9px;padding:12px;margin-bottom:8px}
.criteria-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px}
.criteria-score-row{display:flex;align-items:center;gap:8px}
.criteria-input{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:10px;font-size:20px;font-weight:800;color:var(--text);text-align:center;outline:none;font-family:'DM Mono',monospace}
.criteria-input:focus{border-color:var(--accent)}
.criteria-max{font-size:12px;color:var(--text2);white-space:nowrap}
.criteria-total-bar{background:var(--bg3);border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.criteria-total-label{font-size:12px;color:var(--text2)}
.criteria-total-val{font-size:20px;font-weight:800;font-family:'DM Mono',monospace}

/* CRITERIA BUILDER */
.crit-item{background:var(--bg3);border-radius:9px;padding:11px 12px;margin-bottom:8px;display:flex;gap:8px;align-items:center}
.crit-item input{background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);outline:none;font-family:inherit}
.crit-item input:focus{border-color:var(--accent)}
.crit-name-input{flex:2}
.crit-max-input{flex:1;text-align:center;font-family:'DM Mono',monospace}

/* EXCEL UPLOAD */
.excel-label{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:2px dashed var(--green);border-radius:var(--radius);background:var(--green-dim);color:var(--green);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px}
.divider{height:1px;background:var(--border);margin:16px 0}
.section-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;box-shadow:var(--shadow);border:1px solid var(--border);pointer-events:none}
</style>
</head>
<body>

<!-- ═══ HOME ═══ -->
<div id="page-home">
  <div class="topbar">
    <div class="topbar-info">
      <div class="topbar-title">📚 Sınıf Defteri</div>
    </div>
    <div class="topbar-actions">
      <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
    </div>
  </div>
  <div class="home-header">
    <div>
      <div class="home-title">Sınıflarım</div>
      <div class="home-sub" id="home-sub">Henüz sınıf yok</div>
    </div>
  </div>
  <button class="btn-new-class" onclick="showPage('page-addclass')">＋ Yeni Sınıf Oluştur</button>
  <div id="class-list"></div>
</div>

<!-- ═══ ADD CLASS ═══ -->
<div id="page-addclass" class="hidden">
  <div class="topbar">
    <button class="topbar-back" onclick="showPage('page-home')">‹</button>
    <div class="topbar-info"><div class="topbar-title">Yeni Sınıf</div></div>
  </div>
  <div class="form-wrap">
    <div class="field-group">
      <label class="field-label">Sınıf Adı</label>
      <input id="inp-classname" class="field-input" placeholder="Örn: 8-A, 7-B, 5-C...">
      <div class="field-hint">Bu isim ana ekranda görünür</div>
    </div>
    <div class="field-group">
      <label class="field-label">Sütun Sayısı</label>
      <select id="inp-colcount" class="field-select" onchange="renderColBuilder()">
        <option value="1">1 Sütun</option>
        <option value="2">2 Sütun</option>
        <option value="3" selected>3 Sütun</option>
        <option value="4">4 Sütun</option>
        <option value="5">5 Sütun</option>
      </select>
    </div>
    <div class="section-label">Sütun Ayarları</div>
    <div id="col-builder"></div>
    <button class="btn-primary" onclick="createClass()">Sınıfı Oluştur</button>
    <button class="btn-secondary" onclick="showPage('page-home')">İptal</button>
  </div>
</div>

<!-- ═══ CRITERIA BUILDER (from col setup) ═══ -->
<div id="page-criteria-builder" class="hidden">
  <div class="topbar">
    <button class="topbar-back" onclick="showPage('page-addclass')">‹</button>
    <div class="topbar-info">
      <div class="topbar-title">Kriterler</div>
      <div class="topbar-sub" id="crit-builder-sub"></div>
    </div>
  </div>
  <div class="form-wrap">
    <div class="field-hint" style="margin-bottom:12px">Her kritere isim ve maksimum puan girin. Toplam 100'ü geçemez.</div>
    <div id="crit-builder-list"></div>
    <button class="btn-secondary" onclick="addCritRow()" style="margin-bottom:16px">＋ Kriter Ekle</button>
    <div id="crit-total-display" style="text-align:center;font-size:13px;color:var(--text2);margin-bottom:16px"></div>
    <button class="btn-primary" onclick="saveCriteria()">Kriterleri Kaydet</button>
  </div>
</div>

<!-- ═══ ADD STUDENT ═══ -->
<div id="page-addstudent" class="hidden">
  <div class="topbar">
    <button class="topbar-back" onclick="showPage('page-class')">‹</button>
    <div class="topbar-info">
      <div class="topbar-title">Öğrenci Ekle</div>
      <div class="topbar-sub" id="addstudent-sub"></div>
    </div>
  </div>
  <div class="form-wrap">
    <label class="excel-label">
      📊 Excel Yükle (.xlsx)
      <input type="file" accept=".xlsx,.xls" style="display:none" onchange="handleExcel(event)">
    </label>
    <div class="field-hint" style="text-align:center;margin-bottom:12px">Sütun sırası: No | İsim Soyisim</div>
    <div class="divider"></div>
    <div class="section-label">Elle Ekle</div>
    <div class="field-group">
      <label class="field-label">Öğrenci No</label>
      <input id="inp-no" class="field-input" placeholder="101" inputmode="numeric">
    </div>
    <div class="field-group">
      <label class="field-label">İsim</label>
      <input id="inp-name" class="field-input" placeholder="Öğrenci adı">
    </div>
    <div class="field-group">
      <label class="field-label">Soyisim</label>
      <input id="inp-surname" class="field-input" placeholder="Öğrenci soyadı">
    </div>
    <button class="btn-primary" onclick="addStudent()">＋ Öğrenci Ekle</button>
    <button class="btn-secondary" onclick="showPage('page-class')">✓ Tamam, Sınıfa Dön</button>
    <div id="added-list"></div>
  </div>
</div>

<!-- ═══ CLASS VIEW ═══ -->
<div id="page-class" class="hidden">
  <div class="topbar">
    <button class="topbar-back" onclick="showPage('page-home')">‹</button>
    <div class="topbar-info">
      <div class="topbar-title" id="class-title"></div>
      <div class="topbar-sub" id="class-sub"></div>
    </div>
    <div class="topbar-actions">
      <button class="theme-btn" onclick="toggleTheme()" style="font-size:14px" id="theme-btn2">🌙</button>
    </div>
  </div>
  <div class="toolbar">
    <button class="toolbar-btn" style="background:var(--accent-dim);color:var(--accent)" onclick="showPage('page-addstudent')">➕ Öğrenci</button>
    <button class="toolbar-btn" style="background:var(--green-dim);color:var(--green)" onclick="newSession()">🔄 Yeni Ders</button>
    <button class="toolbar-btn" style="background:var(--yellow-dim);color:var(--yellow)" onclick="openClassNote()">📝 Not</button>
    <button class="toolbar-btn" style="background:var(--bg3);color:var(--text2)" onclick="exportExcel()">📤 Excel</button>
    <button class="toolbar-btn" style="background:var(--red-dim);color:var(--red)" onclick="resetScores()">🗑 Sıfırla</button>
  </div>
  <div id="class-note-bar" class="class-note-bar hidden" onclick="openClassNote()">
    <div class="class-note-bar-label">📝 Sınıf Notu</div>
    <div class="class-note-bar-text" id="class-note-text"></div>
  </div>
  <div id="class-empty" class="hidden empty-state">
    <div class="empty-icon">👨‍🎓</div>
    <div style="font-size:15px;margin-bottom:16px">Öğrenci eklenmedi</div>
    <button class="btn-primary" style="width:auto;padding:11px 24px" onclick="showPage('page-addstudent')">＋ Öğrenci Ekle</button>
  </div>
  <div class="table-wrap" id="table-wrap">
    <table id="score-table">
      <thead id="score-thead"><tr></tr></thead>
      <tbody id="score-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ═══ MODALS ═══ -->

<!-- Note Modal -->
<div id="note-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('note-modal')">
  <div class="modal-box">
    <div class="modal-title" id="note-modal-title"></div>
    <div class="modal-sub" id="note-modal-sub"></div>
    <textarea class="note-textarea" id="note-textarea" placeholder="Notunuzu buraya yazın..."></textarea>
    <div class="modal-btns">
      <button onclick="closeModal('note-modal')" style="background:var(--bg3);color:var(--text)">İptal</button>
      <button onclick="deleteNote()" style="background:var(--red-dim);color:var(--red)" id="btn-del-note">Sil</button>
      <button onclick="saveNote()" style="background:var(--accent);color:white">Kaydet</button>
    </div>
  </div>
</div>

<!-- Manual Input Modal -->
<div id="manual-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('manual-modal')">
  <div class="modal-box">
    <div class="modal-title" id="manual-modal-title"></div>
    <div class="modal-sub" id="manual-modal-sub"></div>
    <input id="manual-input" class="manual-input-big" type="number" min="0" max="100" placeholder="0">
    <div class="modal-btns">
      <button onclick="closeModal('manual-modal')" style="background:var(--bg3);color:var(--text)">İptal</button>
      <button onclick="clearManual()" style="background:var(--red-dim);color:var(--red)">Temizle</button>
      <button onclick="saveManual()" style="background:var(--accent);color:white">Kaydet</button>
    </div>
  </div>
</div>

<!-- Criteria Score Modal -->
<div id="criteria-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('criteria-modal')">
  <div class="modal-box">
    <div class="modal-title" id="criteria-modal-title"></div>
    <div class="modal-sub" id="criteria-modal-sub"></div>
    <div class="criteria-total-bar">
      <span class="criteria-total-label">Toplam</span>
      <span class="criteria-total-val" id="criteria-total-display">0 / 100</span>
    </div>
    <div id="criteria-inputs"></div>
    <div class="modal-btns">
      <button onclick="closeModal('criteria-modal')" style="background:var(--bg3);color:var(--text)">İptal</button>
      <button onclick="saveCriteriaScore()" style="background:var(--accent);color:white">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let classes = JSON.parse(localStorage.getItem('sd_v2') || '[]');
let activeId = null;
let noteTarget = null;
let manualTarget = null;
let criteriaTarget = null;
let editingCriteriaColIdx = null; // which col we're building criteria for

function save() { localStorage.setItem('sd_v2', JSON.stringify(classes)); }
function getActive() { return classes.find(c => c.id === activeId); }
function updActive(fn) { classes = classes.map(c => c.id === activeId ? fn(c) : c); save(); }

let theme = localStorage.getItem('sd_theme') || 'dark';
function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);
  const icon = theme === 'dark' ? '☀️' : '🌙';
  document.querySelectorAll('.theme-btn').forEach(b => b.textContent = icon);
  document.querySelector('meta[name="theme-color"]').setAttribute('content', theme === 'dark' ? '#0d1117' : '#f6f8fa');
}
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('sd_theme', theme);
  applyTheme();
}
applyTheme();

function showPage(id) {
  document.querySelectorAll('[id^="page-"]').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if (id === 'page-home') renderHome();
  if (id === 'page-class') renderClass();
  if (id === 'page-addstudent') renderAddedList();
  if (id === 'page-addclass') renderColBuilder();
  window.scrollTo(0, 0);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add('hidden'), 2400);
}

function renderHome() {
  const list = document.getElementById('class-list');
  const sub = document.getElementById('home-sub');
  sub.textContent = classes.length === 0 ? 'Henüz sınıf yok' : classes.length + ' sınıf';
  if (classes.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🏫</div><div>Yeni sınıf oluşturun</div></div>';
    return;
  }
  list.innerHTML = classes.map(cls => `
    <div class="class-card" onclick="openClass(${cls.id})">
      <div style="flex:1;min-width:0">
        <div class="class-card-name">${cls.name}${cls.note ? ' <span style="font-size:13px">📝</span>' : ''}</div>
        <div class="class-card-meta">${cls.students.length} öğrenci · Ders ${cls.session} · ${cls.columns.length} sütun</div>
      </div>
      <div class="class-card-right">
        <span style="color:var(--text2);font-size:20px">›</span>
        <button class="btn-icon btn-icon-red" onclick="event.stopPropagation();deleteClass(${cls.id})">🗑</button>
      </div>
    </div>
  `).join('');
}

function openClass(id) { activeId = id; showPage('page-class'); }

function deleteClass(id) {
  const cls = classes.find(c => c.id === id);
  if (!confirm('"' + cls.name + '" silinsin mi?')) return;
  classes = classes.filter(c => c.id !== id); save(); renderHome();
  showToast('Sınıf silindi');
}

const COL_TYPES = [
  { id: 'counter',            label: 'Sayaç 1',           preview: previewCounter },
  { id: 'dual',               label: 'Sayaç 2',        preview: previewDual },
  { id: 'manual',             label: 'Manuel',          preview: previewManual },
  { id: 'counter_manual',     label: 'Sayaç 1 + Manuel',  preview: previewCounterManual },
  { id: 'dual_manual',        label: 'Sayaç 2 + Manuel', preview: previewDualManual },
  { id: 'counter_dual_manual',label: 'S1 + S2 + Manuel',       preview: previewFullKarma },
];

function miniBtn(color, bg, label) {
  return `<div style="width:28px;height:28px;border-radius:6px;background:${bg};color:${color};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900">${label}</div>`;
}
function miniVal(v, color) {
  return `<span style="font-weight:800;font-size:13px;color:${color};min-width:24px;text-align:center;font-family:monospace">${v}</span>`;
}
function miniScore(v) {
  return `<span style="font-weight:800;font-size:13px;color:var(--accent);background:var(--bg3);border-radius:6px;padding:2px 7px;font-family:monospace">${v}</span>`;
}

function previewCounter() {

    ${miniVal('+2','var(--green)')}

}
function previewDual() {

}
function previewManual() {
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    ${miniScore('85/100')}

  </div>`;
}
function previewCounterManual() {
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    ${miniVal('+2','var(--green)')}
    <div style="display:flex;gap:4px">${miniBtn('var(--green)','var(--green-dim)','+')}${miniBtn('var(--red)','var(--red-dim)','−')}</div>

    <div style="display:flex;gap:4px">${miniBtn('var(--green)','var(--green-dim)','+')}${miniBtn('var(--red)','var(--red-dim)','−')}</div>
    ${miniScore('85/100')}

}
function previewFullKarma() {

    ${miniVal('+1','var(--green)')}
    <div style="display:flex;gap:3px">${miniBtn('var(--green)','var(--green-dim)','+')}${miniBtn('var(--red)','var(--red-dim)','−')}</div>
    <div style="display:flex;gap:3px">${miniVal('+2','var(--green)')}<span style="color:var(--text2);font-size:11px">/</span>${miniVal('−1','var(--red)')}</div>

  </div>`;

const COL_HINTS = ['Konuşma', 'Katılım', 'Davranış', 'Sınav', 'Ödev'];

// tempCols holds config while building
let tempCols = [];

function renderColBuilder() {
  const n = parseInt(document.getElementById('inp-colcount').value);
  // preserve existing
  while (tempCols.length < n) tempCols.push({ name: COL_HINTS[tempCols.length] || 'Sütun', type: 'counter', criteria: [] });
  tempCols = tempCols.slice(0, n);

  document.getElementById('col-builder').innerHTML = tempCols.map((col, i) => `
    <div class="col-card">
      <div class="col-card-header">
        <span class="col-card-num">Sütun ${i+1}</span>
      </div>
      <div class="field-group" style="margin-bottom:8px">
        <label class="field-label">Sütun Adı</label>
        <input class="field-input" value="${col.name}" oninput="tempCols[${i}].name=this.value" placeholder="${COL_HINTS[i]||'Sütun adı'}">
      </div>
      <div class="field-label" style="margin-bottom:8px">Notlama Tipi</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
        ${COL_TYPES.map(t => `
          <div onclick="setColType(${i},'${t.id}')" style="border:2px solid ${col.type===t.id?'var(--accent)':'var(--border)'};border-radius:10px;background:${col.type===t.id?'var(--accent-dim)':'var(--bg3)'};padding:8px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s">
            <div style="font-size:10px;font-weight:700;color:${col.type===t.id?'var(--accent)':'var(--text2)'};text-align:center;min-height:24px;display:flex;align-items:center">${t.label}</div>
            <div style="pointer-events:none">${t.preview()}</div>
          </div>
        `).join('')}
      </div>
      ${hasManual(col.type) ? `
        <button class="btn-add-criteria" onclick="openCriteriaBuilder(${i})">
          📊 ${col.criteria && col.criteria.length > 0 ? col.criteria.length + ' kriter tanımlı — düzenle' : 'Kriter Ekle (opsiyonel)'}
        </button>
        ${col.criteria && col.criteria.length > 0 ? `
          <div class="criteria-preview">
            ${col.criteria.map(cr => `${cr.name}: ${cr.max}p`).join(' · ')} 
            = Toplam ${col.criteria.reduce((s,c)=>s+Number(c.max),0)}p
          </div>
        ` : ''}
      ` : ''}
    </div>
  `).join('');
}

function hasManual(type) {
  return ['manual','counter_manual','dual_manual','counter_dual_manual'].includes(type);
}

function setColType(i, type) {
  tempCols[i].type = type;
  if (!hasManual(type)) tempCols[i].criteria = [];
  renderColBuilder();
}

// ── CRITERIA BUILDER ──
let tempCriteria = [];

function openCriteriaBuilder(colIdx) {
  editingCriteriaColIdx = colIdx;
  const col = tempCols[colIdx];
  tempCriteria = col.criteria && col.criteria.length > 0
    ? JSON.parse(JSON.stringify(col.criteria))
    : [{ name: 'Kriter 1', max: 20 }];
  document.getElementById('crit-builder-sub').textContent = col.name + ' sütunu için';
  renderCritBuilder();
  showPage('page-criteria-builder');
}

function renderCritBuilder() {
  document.getElementById('crit-builder-list').innerHTML = tempCriteria.map((cr, i) => {
    const otherSum = tempCriteria.reduce((s, c, j) => j !== i ? s + Number(c.max || 0) : s, 0);
    const maxAllowed = Math.max(1, 100 - otherSum);
    return `
    <div class="crit-item">
      <input class="field-input crit-name-input" value="${cr.name}" oninput="tempCriteria[${i}].name=this.value" placeholder="Kriter adı">
      <div style="display:flex;align-items:center;gap:4px">
        <input class="field-input crit-max-input" type="number" min="1" max="${maxAllowed}" value="${cr.max}"
          oninput="tempCriteria[${i}].max=Math.min(${maxAllowed},Math.max(1,Number(this.value)||1));this.value=tempCriteria[${i}].max;updateCritTotal()"
          placeholder="Max">
        <span style="font-size:11px;color:var(--text2);white-space:nowrap">/ ${maxAllowed}</span>
      </div>
      <button onclick="removeCritRow(${i})" style="background:var(--red-dim);border:none;border-radius:8px;color:var(--red);padding:8px 10px;font-weight:700">✕</button>
    </div>`;
  }).join('');
  updateCritTotal();
}

function updateCritTotal() {
  const used = tempCriteria.reduce((s, c) => s + Number(c.max || 0), 0);
  const remaining = 100 - used;
  const el = document.getElementById('crit-total-display');
  el.textContent = 'Toplam: ' + used + ' / 100' + (remaining > 0 ? ' (kalan: ' + remaining + ')' : '');
  el.style.color = used > 100 ? 'var(--red)' : used === 100 ? 'var(--green)' : 'var(--text2)';
}

function addCritRow() {
  const used = tempCriteria.reduce((s, c) => s + Number(c.max || 0), 0);
  const rem = 100 - used;
  if (rem <= 0) { showToast('Toplam zaten 100! Önce bir kriteri azaltın.'); return; }
  tempCriteria.push({ name: 'Kriter ' + (tempCriteria.length + 1), max: Math.min(rem, 20) });
  renderCritBuilder();
}

function removeCritRow(i) {
  tempCriteria.splice(i, 1);
  renderCritBuilder();
}

function saveCriteria() {
  const used = tempCriteria.reduce((s, c) => s + Number(c.max || 0), 0);
  if (used > 100) { showToast('Toplam 100\'ü geçemez!'); return; }
  if (tempCriteria.some(c => !c.name.trim())) { showToast('Tüm kriter isimlerini doldurun'); return; }
  tempCols[editingCriteriaColIdx].criteria = JSON.parse(JSON.stringify(tempCriteria));
  showPage('page-addclass');
  showToast('Kriterler kaydedildi ✓');
}

function newStudentData(name, surname, no, columns) {
  const scores = {};
  columns.forEach((col, i) => {
    scores['c' + i] = {
      counter: 0,
      dualPos: 0,
      dualNeg: 0,
      manual: null,
      criteriaScores: col.criteria ? col.criteria.map(() => null) : []
    };
  });
  return { id: String(Date.now() + Math.random()), name, surname, no, scores, note: '' };
}

function renderAddedList() {
  const cls = getActive(); if (!cls) return;
  document.getElementById('addstudent-sub').textContent = cls.name;
  const sorted = [...cls.students].sort((a,b)=>sortNo(a,b));
  document.getElementById('added-list').innerHTML = sorted.length === 0 ? '' : `
    <div class="student-list" style="margin-top:20px;background:var(--bg2);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)">
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase">Eklendi (${sorted.length})</div>
      ${sorted.map(s => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)">
          <div style="display:flex;gap:8px;align-items:center">
            <span style="background:var(--accent-dim);color:var(--accent);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:800">${s.no||'—'}</span>
            <span style="font-size:13px;font-weight:600">${s.name} ${s.surname}</span>
          </div>
          <button onclick="removeStudent('${s.id}')" style="background:var(--red-dim);border:none;border-radius:6px;color:var(--red);padding:4px 10px;font-size:13px;cursor:pointer">✕</button>
        </div>
      `).join('')}
    </div>`;
}

function addStudent() {
  const cls = getActive(); if (!cls) return;
  const no = document.getElementById('inp-no').value.trim();
  const name = document.getElementById('inp-name').value.trim(); if (!name) return;
  const surname = document.getElementById('inp-surname').value.trim();
  updActive(c => ({...c, students:[...c.students, newStudentData(name, surname, no, c.columns)]}));
  document.getElementById('inp-no').value='';
  document.getElementById('inp-name').value='';
  document.getElementById('inp-surname').value='';
  document.getElementById('inp-no').focus();
  showToast(name + ' ' + surname + ' eklendi');
  renderAddedList();
}

function removeStudent(sid) {
  updActive(c => ({...c, students: c.students.filter(s => s.id !== sid)}));
  renderAddedList();
}

function handleExcel(e) {
  const file = e.target.files[0]; if (!file) return;
  const cls = getActive(); if (!cls) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      const firstVal = String(rows[0]?.[0]||'').trim();
      const startRow = isNaN(firstVal) || firstVal==='' ? 1 : 0;
      const added = [];
      for (let i = startRow; i < rows.length; i++) {
        const no = String(rows[i][0]||'').trim();
        const fullName = String(rows[i][1]||'').trim();
        if (!fullName) continue;
        const parts = fullName.split(/\s+/);
        const surname = parts.length > 1 ? parts[parts.length-1] : '';
        const name = parts.length > 1 ? parts.slice(0,-1).join(' ') : parts[0];
        added.push(newStudentData(name, surname, no, cls.columns));
      }
      if (added.length === 0) { showToast('Öğrenci bulunamadı!'); return; }
      updActive(c => ({...c, students:[...c.students, ...added]}));
      showToast(added.length + ' öğrenci yüklendi ✓');
      renderAddedList();
    } catch(err) { showToast('Dosya okunamadı!'); }
  };
  reader.readAsArrayBuffer(file);
  e.target.value='';
}

// CLASS VIEW
// ══════════════════════════════════════════
function sortNo(a, b) { return (a.no||'9999').localeCompare(b.no||'9999', undefined, {numeric:true}); }

function renderClass() {
  const cls = getActive(); if (!cls) return;
  document.getElementById('class-title').textContent = cls.name;
  document.getElementById('class-sub').textContent = 'Ders ' + cls.session + ' · ' + cls.students.length + ' öğrenci';

  // Class note
  const noteBar = document.getElementById('class-note-bar');
  if (cls.note && cls.note.trim()) {
    document.getElementById('class-note-text').textContent = cls.note;
    noteBar.classList.remove('hidden');
  } else { noteBar.classList.add('hidden'); }

  if (cls.students.length === 0) {
    document.getElementById('class-empty').classList.remove('hidden');
    document.getElementById('table-wrap').classList.add('hidden');
    return;
  }
  document.getElementById('class-empty').classList.add('hidden');
  document.getElementById('table-wrap').classList.remove('hidden');

  // Header
  document.getElementById('score-thead').innerHTML = `<tr>
    <th class="left" style="width:32px">No</th>
    <th class="left" style="min-width:80px">İsim</th>
    ${cls.columns.map(col => `<th style="min-width:${colMinWidth(col)}px">${col.name}</th>`).join('')}
  </tr>`;

  const sorted = [...cls.students].sort(sortNo);
  document.getElementById('score-tbody').innerHTML = sorted.map((s, i) => `
    <tr class="${i%2===0?'even':'odd'}">
      <td style="font-size:10px;color:var(--text2);font-weight:700">${s.no||''}</td>
      <td class="left name-cell" onclick="openStudentNote('${s.id}')">
        <div style="font-size:12px;font-weight:700">${s.name}${s.note&&s.note.trim()?'<span class="note-dot"></span>':''}</div>
        <div style="font-size:10px;color:var(--text2)">${s.surname}</div>
      </td>
      ${cls.columns.map((col, ci) => `<td>${renderCell(s, ci, col)}</td>`).join('')}
    </tr>
  `).join('');
}

function colMinWidth(col) {
  if (col.type === 'counter_dual_manual') return 140;
  if (col.type.includes('manual') && col.type.includes('counter')) return 120;
  if (col.type === 'dual') return 110;
  return 90;
}

function renderCell(s, ci, col) {
  const sc = s.scores['c' + ci] || {};
  const type = col.type;
  let parts = [];

  // Counter part
  if (type.includes('counter') && !type.includes('dual_manual') || type === 'counter' || type === 'counter_manual') {
    const v = sc.counter || 0;
    const color = v > 0 ? 'var(--green)' : v < 0 ? 'var(--red)' : 'var(--text2)';
    if (type === 'counter' || type === 'counter_manual') {
      parts.push(`
        <div class="cell-counter">
          <span class="cell-val" style="color:${color}" id="cv-${s.id}-${ci}">${v>0?'+':''}${v}</span>
          <div class="cell-btns">
            <button class="btn-p" onclick="changeCounter('${s.id}',${ci},1)">+</button>
            <button class="btn-m" onclick="changeCounter('${s.id}',${ci},-1)">−</button>
          </div>
        </div>
      `);
    }
  }

  // Dual part
  if (type.includes('dual')) {
    const pos = sc.dualPos || 0;
    const neg = sc.dualNeg || 0;
    parts.push(`
      <div class="cell-counter">
        <div class="cell-dual">
          <span class="dual-pos" id="dp-${s.id}-${ci}">+${pos}</span>
          <span style="color:var(--text2)"> / </span>
          <span class="dual-neg" id="dn-${s.id}-${ci}">−${neg}</span>
        </div>
        <div class="cell-btns">
          <button class="btn-p" onclick="changeDual('${s.id}',${ci},'pos')">+</button>
          <button class="btn-m" onclick="changeDual('${s.id}',${ci},'neg')">−</button>
        </div>
      </div>
    `);
  }

  // Manual part
  if (type.includes('manual')) {
    const hasCrit = col.criteria && col.criteria.length > 0;
    const v = sc.manual;
    const maxP = hasCrit ? col.criteria.reduce((s,c)=>s+Number(c.max),0) : 100;
    const display = v !== null && v !== undefined ? v + '/' + maxP : '—';
    const clickFn = hasCrit ? `openCriteriaScore('${s.id}',${ci})` : `openManual('${s.id}',${ci})`;
    const cls2 = hasCrit ? 'manual-val has-criteria' : 'manual-val';
    parts.push(`
      <div class="cell-manual">
        <span class="${cls2}" id="mv-${s.id}-${ci}" onclick="${clickFn}">${display}</span>
      </div>
    `);
  }

  return `<div style="display:flex;flex-direction:column;gap:4px;align-items:center">${parts.join('<div style="height:3px"></div>')}</div>`;
}

// ══════════════════════════════════════════
// SCORE CHANGES
// ══════════════════════════════════════════
function getStudent(sid) {
  const cls = getActive(); if (!cls) return null;
  return cls.students.find(s => s.id === sid);
}

function changeCounter(sid, ci, delta) {
  const cls = getActive(); if (!cls) return;
  const s = cls.students.find(s => s.id === sid); if (!s) return;
  if (!s.scores['c'+ci]) s.scores['c'+ci] = {counter:0,dualPos:0,dualNeg:0,manual:null,criteriaScores:[]};
  s.scores['c'+ci].counter += delta;
  save();
  const el = document.getElementById('cv-'+sid+'-'+ci);
  if (el) {
    const v = s.scores['c'+ci].counter;
    el.textContent = (v>0?'+':'') + v;
    el.style.color = v>0?'var(--green)':v<0?'var(--red)':'var(--text2)';
  }
}

function changeDual(sid, ci, which) {
  const cls = getActive(); if (!cls) return;
  const s = cls.students.find(s => s.id === sid); if (!s) return;
  if (!s.scores['c'+ci]) s.scores['c'+ci] = {counter:0,dualPos:0,dualNeg:0,manual:null,criteriaScores:[]};
  if (which === 'pos') s.scores['c'+ci].dualPos++;
  else s.scores['c'+ci].dualNeg++;
  save();
  const ep = document.getElementById('dp-'+sid+'-'+ci);
  const en = document.getElementById('dn-'+sid+'-'+ci);
  if (ep) ep.textContent = '+' + s.scores['c'+ci].dualPos;
  if (en) en.textContent = '−' + s.scores['c'+ci].dualNeg;
}

// ══════════════════════════════════════════
// MANUAL MODAL
// ══════════════════════════════════════════
function openManual(sid, ci) {
  const cls = getActive(); if (!cls) return;
  const s = cls.students.find(s => s.id === sid); if (!s) return;
  const col = cls.columns[ci];
  manualTarget = { sid, ci };
  document.getElementById('manual-modal-title').textContent = s.name + ' ' + s.surname;
  document.getElementById('manual-modal-sub').textContent = col.name + ' — Manuel Not';
  const v = s.scores['c'+ci]?.manual;
  document.getElementById('manual-input').value = v !== null && v !== undefined ? v : '';
  document.getElementById('manual-input').max = 100;
  document.getElementById('manual-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('manual-input').select(), 100);
}

function saveManual() {
  if (!manualTarget) return;
  const { sid, ci } = manualTarget;
  const cls = getActive(); if (!cls) return;
  const s = cls.students.find(s => s.id === sid); if (!s) return;
  const col = cls.columns[ci];
  const maxP = col.criteria && col.criteria.length > 0 ? col.criteria.reduce((sum,c)=>sum+Number(c.max),0) : 100;
  let v = parseFloat(document.getElementById('manual-input').value);
  if (isNaN(v)) v = null;
  else v = Math.min(Math.max(0, v), maxP);
  s.scores['c'+ci].manual = v;
  save();
  updateManualDisplay(sid, ci, v, maxP);
  closeModal('manual-modal');
  showToast('Not kaydedildi ✓');
}

function clearManual() {
  if (!manualTarget) return;
  const { sid, ci } = manualTarget;
  const cls = getActive(); if (!cls) return;
  const s = cls.students.find(s => s.id === sid); if (!s) return;
  const col = cls.columns[ci];
  const maxP = col.criteria && col.criteria.length > 0 ? col.criteria.reduce((sum,c)=>sum+Number(c.max),0) : 100;
  s.scores['c'+ci].manual = null;
  save();
  updateManualDisplay(sid, ci, null, maxP);
  closeModal('manual-modal');
}

function updateManualDisplay(sid, ci, v, maxP) {
  const el = document.getElementById('mv-'+sid+'-'+ci);
  if (el) el.textContent = v !== null && v !== undefined ? v + '/' + maxP : '—';
}

function getMaxP(col) {
  return col.criteria && col.criteria.length > 0
    ? col.criteria.reduce((s,c)=>s+Number(c.max),0)
    : 100;
}

// ══════════════════════════════════════════
// CRITERIA SCORE MODAL
// ══════════════════════════════════════════
function openCriteriaScore(sid, ci) {
  const cls = getActive(); if (!cls) return;
  const s = cls.students.find(s => s.id === sid); if (!s) return;
  const col = cls.columns[ci];
  criteriaTarget = { sid, ci };
  document.getElementById('criteria-modal-title').textContent = s.name + ' ' + s.surname;
  document.getElementById('criteria-modal-sub').textContent = col.name;

  const scores = s.scores['c'+ci].criteriaScores || col.criteria.map(() => null);
  const maxTotal = col.criteria.reduce((sum,c)=>sum+Number(c.max),0);

  document.getElementById('criteria-inputs').innerHTML = col.criteria.map((cr, i) => `
    <div class="criteria-row">
      <div class="criteria-name">${cr.name}</div>
      <div class="criteria-score-row">
        <input class="criteria-input" type="number" min="0" max="${cr.max}" 
          value="${scores[i] !== null && scores[i] !== undefined ? scores[i] : ''}" 
          placeholder="0"
          oninput="updateCriteriaTotal(${ci})"
          id="crit-inp-${i}">
        <span class="criteria-max">/ ${cr.max}</span>
      </div>
    </div>
  `).join('');

  updateCriteriaTotal(ci);
  document.getElementById('criteria-modal').classList.remove('hidden');
}

function updateCriteriaTotal(ci) {
  const cls = getActive(); if (!cls) return;
  const col = cls.columns[ci];
  const maxTotal = col.criteria.reduce((sum,c)=>sum+Number(c.max),0);
  let total = 0;
  col.criteria.forEach((cr, i) => {
    const el = document.getElementById('crit-inp-'+i);
    if (el) { const v = parseFloat(el.value); if (!isNaN(v)) total += v; }
  });
  const el = document.getElementById('criteria-total-display');
  if (el) {
    el.textContent = total + ' / ' + maxTotal;
    el.style.color = total > maxTotal ? 'var(--red)' : total === maxTotal ? 'var(--green)' : 'var(--text)';
  }
}

function saveCriteriaScore() {
  if (!criteriaTarget) return;
  const { sid, ci } = criteriaTarget;
  const cls = getActive(); if (!cls) return;
  const s = cls.students.find(s => s.id === sid); if (!s) return;
  const col = cls.columns[ci];
  const maxTotal = col.criteria.reduce((sum,c)=>sum+Number(c.max),0);

  const newScores = col.criteria.map((cr, i) => {
    const el = document.getElementById('crit-inp-'+i);
    if (!el || el.value === '') return null;
    return Math.min(Math.max(0, parseFloat(el.value) || 0), Number(cr.max));
  });

  const total = newScores.reduce((sum, v) => sum + (v !== null ? v : 0), 0);
  if (total > maxTotal) { showToast('Toplam ' + maxTotal + "'ü geçemez!"); return; }

  s.scores['c'+ci].criteriaScores = newScores;
  s.scores['c'+ci].manual = total > 0 ? total : null;
  save();
  updateManualDisplay(sid, ci, s.scores['c'+ci].manual, maxTotal);
  closeModal('criteria-modal');
  showToast('Kriter notları kaydedildi ✓');
}

// ══════════════════════════════════════════
// NOTES
// ══════════════════════════════════════════
function openClassNote() {
  const cls = getActive(); if (!cls) return;
  noteTarget = { type: 'class' };
  document.getElementById('note-modal-title').textContent = '📝 Sınıf Notu';
  document.getElementById('note-modal-sub').textContent = cls.name;
  document.getElementById('note-textarea').value = cls.note || '';
  document.getElementById('btn-del-note').classList.toggle('hidden', !(cls.note && cls.note.trim()));
  document.getElementById('note-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('note-textarea').focus(), 100);
}

function openStudentNote(sid) {
  const cls = getActive(); if (!cls) return;
  const s = cls.students.find(s => s.id === sid); if (!s) return;
  noteTarget = { type: 'student', sid };
  document.getElementById('note-modal-title').textContent = s.name + ' ' + s.surname;
  document.getElementById('note-modal-sub').textContent = 'No: ' + (s.no||'—') + ' · Öğrenci Notu';
  document.getElementById('note-textarea').value = s.note || '';
  document.getElementById('btn-del-note').classList.toggle('hidden', !(s.note && s.note.trim()));
  document.getElementById('note-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('note-textarea').focus(), 100);
}

function saveNote() {
  const text = document.getElementById('note-textarea').value.trim();
  if (noteTarget.type === 'class') {
    updActive(c => ({...c, note: text}));
  } else {
    updActive(c => ({...c, students: c.students.map(s => s.id === noteTarget.sid ? {...s, note: text} : s)}));
  }
  closeModal('note-modal');
  renderClass();
  showToast('Not kaydedildi ✓');
}

function deleteNote() {
  if (!confirm('Not silinsin mi?')) return;
  if (noteTarget.type === 'class') {
    updActive(c => ({...c, note: ''}));
  } else {
    updActive(c => ({...c, students: c.students.map(s => s.id === noteTarget.sid ? {...s, note: ''} : s)}));
  }
  closeModal('note-modal');
  renderClass();
  showToast('Not silindi');
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

// ══════════════════════════════════════════
// SESSION / RESET
// ══════════════════════════════════════════
function newSession() {
  if (!confirm('Yeni ders başlatılsın mı? Tüm puanlar sıfırlanır.')) return;
  updActive(c => ({
    ...c, session: c.session + 1,
    students: c.students.map(s => {
      const scores = {};
      c.columns.forEach((col, i) => {
        scores['c'+i] = {counter:0,dualPos:0,dualNeg:0,manual:null,criteriaScores:col.criteria?col.criteria.map(()=>null):[]};
      });
      return {...s, scores};
    })
  }));
  renderClass();
  showToast('Yeni ders başladı!');
}

function resetScores() {
  if (!confirm('Tüm puanlar sıfırlansın mı?')) return;
  updActive(c => ({
    ...c,
    students: c.students.map(s => {
      const scores = {};
      c.columns.forEach((col, i) => {
        scores['c'+i] = {counter:0,dualPos:0,dualNeg:0,manual:null,criteriaScores:col.criteria?col.criteria.map(()=>null):[]};
      });
      return {...s, scores};
    })
  }));
  renderClass();
  showToast('Sıfırlandı');
}

// ══════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════
function exportExcel() {
  const cls = getActive(); if (!cls) return;
  const rows = [];

  // Build header
  const header = ['No', 'İsim', 'Soyisim'];
  cls.columns.forEach(col => {
    if (col.type.includes('counter') && !col.type.startsWith('dual')) header.push(col.name + ' (Sayaç)');
    if (col.type.includes('dual')) { header.push(col.name + ' (+)'); header.push(col.name + ' (−)'); }
    if (col.type.includes('manual')) {
      if (col.criteria && col.criteria.length > 0) {
        col.criteria.forEach(cr => header.push(col.name + ' — ' + cr.name));
      }
      header.push(col.name + ' (Not)');
    }
  });
  header.push('Not');
  rows.push(header);

  // Build data
  [...cls.students].sort(sortNo).forEach(s => {
    const row = [s.no, s.name, s.surname];
    cls.columns.forEach((col, i) => {
      const sc = s.scores['c'+i] || {};
      if (col.type.includes('counter') && !col.type.startsWith('dual')) row.push(sc.counter || 0);
      if (col.type.includes('dual')) { row.push(sc.dualPos || 0); row.push(sc.dualNeg || 0); }
      if (col.type.includes('manual')) {
        if (col.criteria && col.criteria.length > 0) {
          const cs = sc.criteriaScores || [];
          col.criteria.forEach((cr, ci) => row.push(cs[ci] !== null && cs[ci] !== undefined ? cs[ci] : ''));
        }
        row.push(sc.manual !== null && sc.manual !== undefined ? sc.manual : '');
      }
    });
    row.push(s.note || '');
    rows.push(row);
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, cls.name.substring(0,31));
  XLSX.writeFile(wb, cls.name.replace(/\s+/g,'_') + '_ders' + cls.session + '.xlsx');
  showToast('Excel indirildi ✓');
}
